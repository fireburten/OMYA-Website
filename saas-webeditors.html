<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>saas-webeditors</title>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/site.css">
  <link rel="stylesheet" href="styles/saas-webeditors.css">
</head>
<body>
<section data-jg-starter="logo" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px;background:#ffffff;box-sizing:border-box;overflow:hidden;"><img src="assets/3-JacksGrapes.png" alt="Jack's Grapes logo" style="display: block; margin: auto; object-fit: contain; width: 360px !important; max-width: 64vw !important; height: auto !important; justify-self: center;"></section>
<script>
(function(){
  function activate(root){
    var doc = root || document;
    doc.querySelectorAll('.fade-up,.reveal-on-scroll,[data-animate-on-scroll]').forEach(function(el){
      el.classList.add('visible','is-visible','in-view');
      el.querySelectorAll('.skill-bar-fill[data-pct]').forEach(function(bar){
        bar.style.width = (bar.getAttribute('data-pct') || '0') + '%';
      });
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', function(){ activate(document); });
  else activate(document);
  window.addEventListener('load', function(){ activate(document); });
})();
</script>

<script src="scripts/saas-webeditors.js"></script>
</body>
</html>
